# Application name
spring.application.name=hiveSpace

# Server Port (Render uses the PORT environment variable)
server.port=${PORT:8080}

# PostgreSQL Database
# Uses DATABASE_URL for Production (Render/Supabase) or local fallback
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hivespace_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings (Robust for Cloud)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Removed explicit dialect (Spring Boot auto-detects it correctly now)

# Avoid Open In View warnings
spring.jpa.open-in-view=false
