services:
  - type: web
    name: hivespace-backend
    env: java
    region: oregon
    buildCommand: ./gradlew build -x test
    startCommand: java -jar build/libs/hiveSpace-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hivespace-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: hivespace-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hivespace-db
          property: password

databases:
  - name: hivespace-db
    databaseName: hivespace_db
    user: postgres
    plan: free
