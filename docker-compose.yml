# Use the modern docker-compose syntax
services:
  # ☕ HiveSpace Backend Application
  backend:
    build: .
    container_name: hivespace_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Link to the DB service below
      DATABASE_URL: jdbc:postgresql://postgres:5432/hivespace_db
      DB_USERNAME: postgres
      DB_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy

  # 🐘 PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hivespace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hivespace_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - hivespace_pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hivespace_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 📊 pgAdmin (Web-based Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hivespace_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hivespace.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - hivespace_pgadmin_data:/var/lib/pgadmin

volumes:
  hivespace_pg_data:
    driver: local
  hivespace_pgadmin_data:
    driver: local
