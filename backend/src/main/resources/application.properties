# Application name
spring.application.name=hiveSpace

# Server Port (Render uses the PORT environment variable)
server.port=${PORT:8080}

# PostgreSQL Database
# Uses DATABASE_URL for Production (Render/Supabase) or local fallback
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hivespace_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings (Robust for Cloud)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Avoid Open In View warnings
spring.jpa.open-in-view=false

# Security
jwt.secret=${JWT_SECRET:3a2f8b5c90d41e7f6a5b4c3d2e1f0a9b8c7d6e5f4a3b2c1d0e9f8a7b6c5d4e3f}
