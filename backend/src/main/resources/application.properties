# Application name
spring.application.name=hiveSpace

# Server Port (Render uses the PORT environment variable)
server.port=${PORT:8080}

# PostgreSQL Database
# Uses DATABASE_URL for Production (Render/Supabase) or local fallback
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-orange-sunset-am84peh2-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_E8eazUXNnv5R}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings (Robust for Cloud)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Avoid Open In View warnings
spring.jpa.open-in-view=false

# Security
jwt.secret=${JWT_SECRET:4e62523246335a4756795332356c6443317a5a574e795a574d6c4d6a4179Tm8=}
