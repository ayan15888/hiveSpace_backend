name: HiveSpace Keep-Alive

on:
  schedule:
    # Run every 10 minutes to keep Render Free Tier awake (GitHub cron can be delayed)
    - cron: '*/10 * * * *'
  # Also allow manual triggering
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Wakeup Call
        run: |
          echo "Sending ping to Render service..."
          # Using --connect-timeout and --max-time to allow for server wakeup (cold start)
          RESPONSE=$(curl -s -L -w "%{http_code}" \
            --connect-timeout 60 \
            --max-time 120 \
            --retry 3 \
            "${{ secrets.RENDER_SERVICE_URL }}/api/health" -o /dev/null)
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Success! Server is AWAKE and HEALTHY (Status: $RESPONSE)"
          else
            echo "⚠️ Warning! Server returned Status: $RESPONSE"
            echo "Check if RENDER_SERVICE_URL secret is correct."
            exit 1
          fi
